apiVersion: apps/v1
kind: Deployment
metadata:
  name: blast-radius
  namespace: default
  labels:
    app: blast-radius
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: blast-radius
  template:
    metadata:
      labels:
        app: blast-radius
    spec:
      serviceAccountName: blast-radius
      containers:
      - name: blast-radius
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: S3_BUCKET
          value: "{{ .Values.s3.bucket }}"
        envFrom:
        - configMapRef:
            name: blast-radius-config
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL