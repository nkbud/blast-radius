apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "blast-radius.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "blast-radius.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "blast-radius.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "blast-radius.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "blast-radius.fullname" . }}
      containers:
      - name: blast-radius
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: S3_BUCKET
          value: "{{ .Values.s3.bucket }}"
        envFrom:
        - configMapRef:
            name: {{ include "blast-radius.fullname" . }}-config
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}