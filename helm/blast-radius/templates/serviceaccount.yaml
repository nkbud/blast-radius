apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "blast-radius.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "blast-radius.labels" . | nindent 4 }}
  annotations:
    eks.amazonaws.com/role-arn: "{{ .Values.aws.roleArn }}"
automountServiceAccountToken: true