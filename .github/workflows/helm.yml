name: Package and Push Helm Chart

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  CHART_NAME: blast-radius

jobs:
  package-helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: '3.13.0'

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="0.1.0-${GITHUB_SHA::8}"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "chart_version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Update Chart.yaml version
      run: |
        sed -i "s/version: .*/version: ${{ steps.meta.outputs.chart_version }}/" helm/${{ env.CHART_NAME }}/Chart.yaml
        if [[ "${{ steps.meta.outputs.version }}" != "0.1.0-"* ]]; then
          sed -i "s/appVersion: .*/appVersion: \"${{ steps.meta.outputs.version }}\"/" helm/${{ env.CHART_NAME }}/Chart.yaml
        fi

    - name: Package Helm Chart
      run: |
        helm package helm/${{ env.CHART_NAME }} --destination .

    - name: Push Helm Chart to OCI Registry
      if: github.event_name != 'pull_request'
      run: |
        CHART_VERSION=${{ steps.meta.outputs.chart_version }}
        helm push ${{ env.CHART_NAME }}-${CHART_VERSION}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

    - name: Create release artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        mkdir -p release-artifacts
        cp ${{ env.CHART_NAME }}-*.tgz release-artifacts/

    - name: Upload release artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: helm-chart
        path: release-artifacts/
        retention-days: 30